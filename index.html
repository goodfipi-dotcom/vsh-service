<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>VSH SERVICE</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --neon-blue: #00f2ff;
            --main-bg: #0f172a;
            --glass-bg: rgba(15, 23, 42, 0.95);
            --text-color: #f8fafc;
            --accent-red: #ff4757;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: var(--main-bg);
            color: var(--text-color);
            margin: 0; padding: 0; min-height: 100vh;
            overflow-x: hidden;
        }
        .container { padding: 20px; max-width: 500px; margin: 0 auto; animation: fadeIn 0.3s ease; }
        .hidden { display: none !important; }
        .card {
            background: var(--glass-bg);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(0, 242, 255, 0.2);
            border-radius: 20px; padding: 20px; margin-bottom: 20px;
        }
        h1, h2 { color: var(--neon-blue); text-transform: uppercase; letter-spacing: 1px; margin: 0 0 15px 0; }
        .btn {
            display: flex; align-items: center; justify-content: center;
            background: linear-gradient(135deg, #2481cc, #00d4ff);
            color: #fff; border: none; padding: 16px; margin: 12px 0;
            border-radius: 14px; width: 100%; font-weight: bold; font-size: 16px;
            cursor: pointer; transition: 0.2s; text-decoration: none;
        }
        .btn:disabled { background: #475569 !important; opacity: 0.6; cursor: not-allowed; }
        .btn-outline { background: transparent; border: 2px solid var(--neon-blue); color: var(--neon-blue); }
        .input {
            width: 100%; padding: 14px; margin: 10px 0; border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            background: rgba(15, 23, 42, 0.6); color: #fff; font-size: 16px; box-sizing: border-box;
        }
        .category-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        .cat-item {
            padding: 15px; border: 1px solid rgba(0, 242, 255, 0.3); border-radius: 12px;
            text-align: center; cursor: pointer; transition: 0.3s; font-size: 13px;
        }
        .cat-item.active { background: var(--neon-blue); color: #000; font-weight: bold; }
        .status-badge { display: inline-block; padding: 5px 12px; border-radius: 20px; background: #2481cc; font-size: 12px; margin-bottom: 10px; }
        .timer-box { font-size: 32px; font-weight: bold; color: var(--accent-red); text-align: center; margin: 15px 0; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .waiting-text { font-style: italic; opacity: 0.8; text-align: center; height: 40px; margin-top: 10px; color: var(--neon-blue); }
    </style>
</head>
<body>

    <div id="page-role" class="container">
        <div class="card" style="text-align: center; margin-top: 40px;">
            <h1>VSH SERVICE</h1>
            <p style="opacity: 0.7;">Система распределения ресурсов</p>
        </div>
        <button class="btn" onclick="showPage('page-customer')">🙋‍♂️ МНЕ НУЖНЫ РАБОЧИЕ</button>
        <button class="btn btn-outline" onclick="showPage('page-worker-auth')">🛠️ ВХОД ДЛЯ БРИГАД</button>
    </div>

    <div id="page-customer" class="container hidden">
        <div class="card">
            <h2>КТО ВАМ НУЖЕН?</h2>
            <div class="category-grid">
                <div class="cat-item active" onclick="selectCat(this, 'loaders')">ГРУЗЧИКИ</div>
                <div class="cat-item" onclick="selectCat(this, 'workers')">РАЗНОРАБОЧИЕ</div>
                <div class="cat-item" onclick="selectCat(this, 'tech')">СПЕЦТЕХНИКА</div>
            </div>
            <div id="cat-description" class="card" style="font-size: 14px; background: rgba(0,242,255,0.05); margin-bottom:0;">
                Грузчики: 850-900₽/час. Уверенное качество.
            </div>
        </div>
        <div class="card">
            <input type="text" id="cust-name" class="input" placeholder="Ваше имя">
            <input type="text" id="cust-address" class="input" placeholder="Адрес">
            <input type="text" id="cust-task" class="input" placeholder="Что нужно сделать?">
            <input type="tel" id="cust-phone" class="input" placeholder="Номер телефона">
            <button class="btn" id="submit-btn" onclick="submitOrder()">🚀 ОТПРАВИТЬ ЗАЯВКУ</button>
            <button class="btn btn-outline" onclick="showPage('page-role')">НАЗАД</button>
        </div>
    </div>

    <div id="customer-status" class="container hidden">
        <div class="card" style="text-align:center;">
            <div class="status-badge">ПОИСК БРИГАДЫ</div>
            <h2 id="status-user-name">Заявка принята!</h2>
            <div class="waiting-text" id="waiting-messages">Ребята уже зашнуровывают берцы...</div>
            <button class="btn btn-outline" style="margin-top:20px;" onclick="tg.close()">ЗАКРЫТЬ</button>
        </div>
    </div>

    <div id="page-worker-auth" class="container hidden">
        <div class="card">
            <h2>ДОСТУП</h2>
            <input type="password" id="worker-code" class="input" placeholder="Секретный код">
            <button class="btn" onclick="workerLogin()">ВОЙТИ</button>
            <button class="btn btn-outline" onclick="showPage('page-role')">НАЗАД</button>
        </div>
    </div>

    <div id="page-worker-cabinet" class="container hidden">
        <div class="card"><h2>📋 ЗАЯВКИ</h2></div>
        <div id="orders-list">
            <div class="card">
                <b>Грузчики | 2 чел.</b><br>📍 Центр<br>
                <button class="btn" onclick="startAcceptProcess('Центр', '900₽/час')">ПРИНЯТЬ</button>
            </div>
        </div>
    </div>

    <div id="page-warning" class="container hidden">
        <div class="card" style="border-color: var(--accent-red);">
            <h2 style="color: var(--accent-red);">⚠️ ПРАВИЛА</h2>
            <div id="warning-details"></div>
            <div class="timer-box" id="warning-timer">10</div>
            <button id="btn-accept-final" class="btn" disabled onclick="confirmAccept()">ПРИНИМАЮ</button>
        </div>
    </div>

    <div id="page-contacts" class="container hidden">
        <div class="card" style="text-align:center;">
            <h2>КОНТАКТЫ</h2>
            <div id="final-contacts" style="margin: 20px 0; text-align:left;"></div>
            <div class="timer-box" id="contact-timer">03:00</div>
            <button class="btn" onclick="tg.close()">✅ ЕДУ НА ЗАКАЗ</button>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        let currentCategory = 'loaders';
        const BACKEND_URL = 'https://vsh-app-production.up.railway.app'; 

        function showPage(id) {
            document.querySelectorAll('.container').forEach(p => p.classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
        }

        function selectCat(el, cat) {
            document.querySelectorAll('.cat-item').forEach(i => i.classList.remove('active'));
            el.classList.add('active');
            currentCategory = cat;
            const d = document.getElementById('cat-description');
            if(cat === 'loaders') d.innerText = "Грузчики: 850-900₽/час. Уверенное качество.";
            if(cat === 'workers') d.innerText = "Разнорабочие: от 5000₽ за смену. Крепкие парни.";
            if(cat === 'tech') d.innerText = "Спецтехника: По договоренности. Быстрая подача.";
        }

        async function submitOrder() {
            const btn = document.getElementById('submit-btn');
            const data = {
                name: document.getElementById('cust-name').value,
                address: document.getElementById('cust-address').value,
                task: document.getElementById('cust-task').value,
                phone: document.getElementById('cust-phone').value,
                category: currentCategory
            };

            if(!data.name || !data.address || !data.phone) return tg.showAlert("Заполни поля!");

            btn.disabled = true;
            try {
                await fetch(`${BACKEND_URL}/api/orders`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(data)
                });
                showPage('customer-status');
                const msgs = ["Ищем бригаду...", "Бригадир на связи...", "Машина выезжает..."];
                let i = 0; setInterval(() => { i = (i + 1) % msgs.length; document.getElementById('waiting-messages').innerText = msgs[i]; }, 3000);
            } catch(e) { tg.showAlert("Ошибка сервера!"); btn.disabled = false; }
        }

        function workerLogin() {
            if(document.getElementById('worker-code').value === '777') showPage('page-worker-cabinet');
            else tg.showAlert("Код неверный!");
        }

        function startAcceptProcess(addr, rate) {
            showPage('page-warning');
            document.getElementById('warning-details').innerHTML = `Объект: ${addr}<br>Ставка: ${rate}<br><br>Не приедешь — бан.`;
            let t = 10;
            const b = document.getElementById('btn-accept-final');
            const it = setInterval(() => {
                t--; document.getElementById('warning-timer').innerText = t;
                if(t <= 0) { clearInterval(it); b.disabled = false; }
            }, 1000);
        }

        function confirmAccept() {
            showPage('page-contacts');
            document.getElementById('final-contacts').innerHTML = `👤 Александр<br>📞 <a href="tel:+79991234567" style="color:var(--neon-blue);">+7 (999) 123-45-67</a>`;
            let t = 180;
            setInterval(() => {
                t--; let m = Math.floor(t/60), s = t%60;
                document.getElementById('contact-timer').innerText = `${m}:${s<10?'0'+s:s}`;
            }, 1000);
        }
    </script>
</body>
</html>
